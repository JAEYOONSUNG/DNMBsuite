version: "3.9"

services:
  dnmbsuite:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DNMB_REF: ${DNMB_REF:-master}
    image: ghcr.io/jaeyoonsung/dnmbsuite:${IMAGE_TAG:-latest}
    container_name: dnmbsuite
    volumes:
      - ./data:/data
      - ~/.dnmb-cache:/opt/dnmb/cache
    environment:
      - DNMB_CACHE_ROOT=/opt/dnmb/cache
      - DNMB_AUTO_UPDATE=${DNMB_AUTO_UPDATE:-0}
      - DNMB_AUTO_UPDATE_BRANCH=${DNMB_AUTO_UPDATE_BRANCH:-master}
    working_dir: /data

  dnmbshell:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DNMB_REF: ${DNMB_REF:-master}
    image: ghcr.io/jaeyoonsung/dnmbsuite:${IMAGE_TAG:-latest}
    container_name: dnmbsuite-shell
    volumes:
      - ./data:/data
      - ~/.dnmb-cache:/opt/dnmb/cache
    environment:
      - DNMB_CACHE_ROOT=/opt/dnmb/cache
      - DNMB_AUTO_UPDATE=${DNMB_AUTO_UPDATE:-0}
      - DNMB_AUTO_UPDATE_BRANCH=${DNMB_AUTO_UPDATE_BRANCH:-master}
    working_dir: /data
    command: ["R"]
